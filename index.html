<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدائح المصطفى</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

    <div id="main-menu" class="container">
        <h1>مدائح المصطفى ﷺ</h1>
        <p>مجموعة من أجمل القصائد والمدائح النبوية</p>
        <button onclick="showPoem('القصيدة الأولى: نهج البردة', 'أمن تذكر جيرانٍ بذي سلمِ...')">نهج البردة</button>
        <button onclick="showPoem('القصيدة الثانية: البردة', 'مولاي صل وسلم دائماً أبداً...')">البردة</button>
    </div>

    <div id="poem-view" class="container hidden">
        <h2 id="poem-title">اسم القصيدة</h2>
        <p id="poem-content">نص القصيدة هنا</p>
        <button onclick="hidePoem()">← عودة للقائمة</button>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
