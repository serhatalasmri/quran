<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدائح المصطفى ﷺ - النسخة الاحترافية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="app-container" class="app-container">
        
        <header id="site-header">
            <h1>مدائح المصطفى ﷺ</h1>
            <p id="sub-header">موسوعة المدائح النبوية الشريفة</p>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="ابحث عن قصيدتك المفضلة..." aria-label="Search">
            </div>
        </header>

        <main id="main-content">
            <section id="poem-list-section">
                <div id="poem-grid" class="poem-grid">
                    </div>
            </section>
        </main>

        <section id="reader-section" class="hidden">
            <div class="reader-toolbar">
                <button id="back-button" class="btn-primary">← العودة للقائمة</button>
                <h2 id="current-title"></h2>
            </div>
            <div id="poem-display" class="poem-display-area">
                </div>
        </section>

        <footer id="site-footer">
            <p>جميع الحقوق محفوظة - مدائح المصطفى</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
