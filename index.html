<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدائح المصطفى ﷺ</title>
    <style>
        body { background-color: #0c1421; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app { width: 100%; max-width: 450px; background: #1e293b; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { color: #f59e0b; margin-bottom: 20px; }
        button { display: block; width: 100%; padding: 18px; margin: 12px 0; border: none; border-radius: 12px; background: #334155; color: white; font-weight: bold; cursor: pointer; border: 1px solid #475569; }
        button:hover { background: #f59e0b; color: #000; }
        .poem-text { font-size: 1.3rem; line-height: 2.2; margin: 20px 0; color: #e2e8f0; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="app">
        <div id="home">
            <h1>مدائح المصطفى ﷺ</h1>
            <div id="list"></div>
        </div>
        <div id="view" class="hidden">
            <h2 id="title" style="color: #f59e0b;"></h2>
            <div id="content" class="poem-text"></div>
            <button onclick="goHome()">← العودة للقائمة</button>
        </div>
    </div>

    <script>
        const data = [
            { t: "البردة الشريفة", c: "مولاي صلِّ وسلم دائماً أبداً..." },
            { t: "نهج البردة", c: "ريمٌ على القاعِ بين البانِ والعلمِ..." },
            { t: "يا إمام الرسل", c: "يا إمامَ الرسلِ يا سندي..." },
            { t: "قصيدة الهمزية", c: "كيف ترقى رقيك الأنبياء..." },
            { t: "أريت المحبين", c: "أريتَ المحبين كيف يبكون..." },
            { t: "يا رسول الله", c: "يا رسول الله يا نبع الحنان..." },
            { t: "قمر سيدنا النبي", c: "قمرٌ قمرٌ قمرٌ سيدنا النبي..." },
            { t: "في مدح الحبيب", c: "في مدح الحبيبِ تذوب القلوب..." }
        ];
        
        const list = document.getElementById('list');
        data.forEach((p, i) => {
            let b = document.createElement('button');
            b.innerText = p.t;
            b.onclick = () => {
                document.getElementById('title').innerText = p.t;
                document.getElementById('content').innerText = p.c;
                document.getElementById('home').classList.add('hidden');
                document.getElementById('view').classList.remove('hidden');
            };
            list.appendChild(b);
        });

        function goHome() {
            document.getElementById('home').classList.remove('hidden');
            document.getElementById('view').classList.add('hidden');
        }
    </script>
</body>
</html>
