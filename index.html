<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدائح المصطفى</title>
<style>
    body { background-color: #0f2027; font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
    .card { width: 100%; max-width: 400px; background: #2c3e50; padding: 25px; border-radius: 20px; text-align: center; color: white; }
    
    /* لون العناوين */
    h1, h2 { color: #ffffff; } 
    
    /* لون نص القصيدة */
    #content { color: #f0f0f0; font-size: 18px; line-height: 1.8; }
    
    /* لون الأزرار */
    button { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; background: #3498db; color: white; font-weight: bold; cursor: pointer; }
    
    .hidden { display: none; }
</style>
</head>
<body>

    <div class="card">
        <div id="menu">
            <h1>مدائح المصطفى ﷺ</h1>
            <div id="buttons"></div>
        </div>

        <div id="poem" class="hidden">
            <h2 id="title"></h2>
            <p id="content"></p>
            <button onclick="hide()">← عودة للقائمة</button>
        </div>
    </div>

    <script>
        // القصائد هنا
        const data = [
            { title: "البردة الشريفة", text: "مولاي صلِّ وسلم دائماً أبداً..." },
            { title: "نهج البردة", text: "ريمٌ على القاعِ بين البانِ والعلمِ..." }
        ];

        // إنشاء الأزرار تلقائياً
        const btnContainer = document.getElementById('buttons');
        data.forEach((p, i) => {
            let b = document.createElement('button');
            b.innerText = p.title;
            b.onclick = () => show(i);
            btnContainer.appendChild(b);
        });

        function show(i) {
            document.getElementById('title').innerText = data[i].title;
            document.getElementById('content').innerText = data[i].text;
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('poem').classList.remove('hidden');
        }

        function hide() {
            document.getElementById('menu').classList.remove('hidden');
            document.getElementById('poem').classList.add('hidden');
        }
    </script>
</body>
</html>
